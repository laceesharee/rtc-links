<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Round The Clock Notary — Hood County, Texas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0e1b3a;--navy-mid:#1a2d5a;--navy-deep:#080f20;
  --gold:#c9a84c;--gold-bright:#e8c96a;--gold-pale:#f0dfa0;
  --cream:#f8f3e8;--cream-dark:#ede5d0;--border:#cfc0a0;
  --text:#0e1b3a;--muted:#6b7280;
}
html,body{min-height:100%;width:100%}
body{
  font-family:"DM Sans",sans-serif;
  background:var(--navy-deep);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:0 0 2rem;
  position:relative;overflow-x:hidden;
}

/* Background texture */
body::before{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.12),transparent 60%),
    radial-gradient(ellipse at 100% 100%,rgba(26,45,90,.8),transparent 50%),
    linear-gradient(180deg,#080f20 0%,#0e1b3a 50%,#080f20 100%);
  z-index:0;pointer-events:none;
}
body::after{
  content:"";position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px);
  background-size:32px 32px;
  z-index:0;pointer-events:none;
}

.page{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  display:flex;flex-direction:column;align-items:center;
  padding:0 1.25rem;
}

/* ── HERO ── */
.hero{
  width:100%;text-align:center;
  padding:2.5rem 0 1.75rem;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
}

.logo-ring{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.05));
  border:2px solid rgba(201,168,76,.35);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(201,168,76,.2),0 0 80px rgba(201,168,76,.08);
  animation:pulse 3s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 40px rgba(201,168,76,.2),0 0 80px rgba(201,168,76,.08)}
  50%{box-shadow:0 0 60px rgba(201,168,76,.35),0 0 100px rgba(201,168,76,.15)}
}
.logo-ring img{width:90px;height:90px;object-fit:contain;border-radius:50%}

.gold-rule{
  width:60px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:.25rem auto;
}

.hero-title{
  font-family:"Cinzel",serif;
  font-size:1.35rem;font-weight:800;
  color:var(--gold-bright);
  letter-spacing:.04em;
  line-height:1.2;
  text-shadow:0 2px 20px rgba(201,168,76,.3);
}
.hero-sub{
  font-family:"Cinzel",serif;
  font-size:.62rem;font-weight:600;
  color:rgba(201,168,76,.65);
  letter-spacing:.2em;text-transform:uppercase;
  margin-top:-.25rem;
}
.hero-tag{
  font-size:.82rem;color:rgba(255,255,255,.55);
  font-weight:400;letter-spacing:.03em;
  font-style:italic;
}
.trust-row{
  display:flex;align-items:center;gap:.5rem;
  background:rgba(201,168,76,.08);
  border:1px solid rgba(201,168,76,.2);
  border-radius:30px;
  padding:.4rem 1rem;
  margin-top:.25rem;
}
.trust-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);flex-shrink:0;
}
.trust-text{
  font-family:"Cinzel",serif;
  font-size:.58rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold-pale);
}

/* ── BUTTONS ── */
.btns{width:100%;display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.25rem}

.btn{
  width:100%;padding:1.05rem 1.5rem;
  border-radius:14px;
  border:none;cursor:pointer;
  font-family:"Cinzel",serif;
  font-size:.88rem;font-weight:700;
  letter-spacing:.07em;
  text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:.65rem;
  transition:all .22s ease;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.btn::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
  opacity:0;transition:opacity .2s;
}
.btn:hover::before,.btn:active::before{opacity:1}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0) scale(.98)}

.btn-quote{
  background:linear-gradient(135deg,var(--gold),var(--gold-bright));
  color:var(--navy);
  box-shadow:0 4px 20px rgba(201,168,76,.4),0 1px 0 rgba(255,255,255,.2) inset;
}
.btn-quote:hover{box-shadow:0 8px 30px rgba(201,168,76,.55)}

.btn-book{
  background:linear-gradient(135deg,#1a2d5a,#0e1b3a);
  color:var(--gold-bright);
  border:1.5px solid rgba(201,168,76,.4);
  box-shadow:0 4px 20px rgba(14,27,58,.5);
}
.btn-book:hover{border-color:rgba(201,168,76,.7);box-shadow:0 8px 30px rgba(14,27,58,.7)}

.btn-vcard{
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.85);
  border:1.5px solid rgba(255,255,255,.12);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.btn-vcard:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25)}

.btn-icon{font-size:1.1rem;flex-shrink:0}

/* ── DIVIDER ── */
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent);
  margin:.5rem 0;
}

/* ── SOCIAL ── */
.socials{
  display:flex;gap:1rem;align-items:center;
  margin:.25rem 0 1rem;
}
.social-btn{
  width:48px;height:48px;border-radius:12px;
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;transition:all .2s;
  color:rgba(255,255,255,.6);
  -webkit-tap-highlight-color:transparent;
}
.social-btn:hover{
  background:rgba(201,168,76,.12);
  border-color:rgba(201,168,76,.35);
  color:var(--gold-bright);
  transform:translateY(-2px);
}
.social-btn svg{width:20px;height:20px;fill:currentColor}

/* ── FOOTER ── */
.foot{
  font-size:.65rem;color:rgba(255,255,255,.22);
  text-align:center;line-height:1.8;
  font-family:"Cinzel",serif;letter-spacing:.08em;
  margin-top:.5rem;
}
.foot a{color:rgba(201,168,76,.4);text-decoration:none}
</style>
</head>
<body>
<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="logo-ring">
      <img src="logo.png" alt="Round The Clock Notary">
    </div>
    <div class="gold-rule"></div>
    <div class="hero-title">Round The Clock Notary</div>
    <div class="hero-sub">Hood County, Texas</div>
    <div class="hero-tag">Available When It Matters Most &mdash; Around the Clock</div>
    <div class="trust-row">
      <div class="trust-dot"></div>
      <div class="trust-text">Licensed &nbsp;&middot;&nbsp; Bonded &nbsp;&middot;&nbsp; Insured</div>
      <div class="trust-dot"></div>

  <!-- BUTTONS -->
  <div class="btns">
    <a href="https://laceesharee.github.io/rtc-notary-calculator/" class="btn btn-quote">
      <span class="btn-icon">&#128197;</span>
      Get a Free Quote
    </a>
    <a href="https://laceesharee.github.io/rtc-notary-calculator/" class="btn btn-book">
      <span class="btn-icon">&#9200;</span>

    </a>

      <span class="btn-icon">&#128100;</span>
      Save My Contact
    </a>
  </div>

  <div class="divider"></div>

  <!-- SOCIAL -->
  <div class="socials">
    <a href="https://www.facebook.com/RoundTheClockNotary" target="_blank" class="social-btn" aria-label="Facebook">
      <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
    </a>
    <a href="https://www.linkedin.com/company/round-the-clock-notary/" target="_blank" class="social-btn" aria-label="LinkedIn">
      <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    </a>
  </div>

  <!-- FOOTER -->
  <div class="foot">
    <div>817-512-7217 &nbsp;&middot;&nbsp; info@roundtheclocknotary.com</div>
    <div><a href="https://www.roundtheclocknotary.com">RoundTheClockNotary.com</a></div>
  </div>

</div>

<!-- vCard download -->
<script>
document.getElementById("vcardBtn").addEventListener("click", function(e) {
  e.preventDefault();
  var vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "FN:Round The Clock Notary",
    "ORG:Round The Clock Notary",
    "TITLE:Mobile Notary Public — Hood County, Texas",
    "TEL;TYPE=CELL,VOICE:+18175127217",
    "EMAIL;TYPE=WORK:info@roundtheclocknotary.com",
    "URL:https://www.roundtheclocknotary.com",
    "ADR;TYPE=WORK:;;Hood County;Granbury;TX;76048;USA",
    "NOTE:Licensed. Bonded. Insured. Available When It Matters Most — Around the Clock.",
    "X-SOCIALPROFILE;TYPE=facebook:https://www.facebook.com/RoundTheClockNotary",
    "X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/company/round-the-clock-notary/",
    "END:VCARD"
  ].join("\r\n");

  var blob = new Blob([vcard], {type:"text/vcard;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "RoundTheClockNotary.vcf";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
